<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="cart-contents">
    <div th:if="${createdOrderId}" class="order-success-banner">
        Order <strong th:text="'#' + ${createdOrderId}">order</strong> created successfully.
    </div>

    <p th:if="${#lists.isEmpty(cartItems)}" class="empty-msg">Your cart is empty.</p>

    <div th:each="ci : ${cartItems}" class="cart-row">
        <div class="cart-item-info">
            <span class="item-name">
                <span th:text="${ci.item.name}">Name</span>
                <span th:if="${ci.item.provisional}" class="badge-provisional">Provisional</span>
            </span>
            <span class="item-desc" th:text="${ci.item.description}">Description</span>
        </div>
        <div class="cart-item-controls">
            <button th:attr="hx-post='/cart/' + ${ci.id} + '/decrease'"
                    hx-target="#cart-contents"
                    hx-swap="innerHTML"
                    class="btn-qty"
                    aria-label="Decrease quantity">&#8722;</button>
            <span class="qty-display" th:text="${ci.quantity}">1</span>
            <button th:attr="hx-post='/cart/' + ${ci.id} + '/increase'"
                    hx-target="#cart-contents"
                    hx-swap="innerHTML"
                    class="btn-qty"
                    aria-label="Increase quantity">&#43;</button>
            <button th:attr="hx-post='/cart/' + ${ci.id} + '/remove'"
                    hx-target="#cart-contents"
                    hx-swap="innerHTML"
                    class="btn-remove"
                    aria-label="Remove item">&#10005;</button>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-footer">
        <button hx-post="/orders/create"
                hx-target="#cart-contents"
                hx-swap="innerHTML"
                hx-confirm="Submit this cart as an order?"
                class="btn-request-order">
            Request Items
        </button>
    </div>
</div>
</body>
</html>
