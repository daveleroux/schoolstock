<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="item-results">
    <p th:if="${#lists.isEmpty(items)}" class="empty-msg">No results found.</p>
    <div th:each="item : ${items}" class="item-row">
        <div class="item-info">
            <span class="item-name" th:text="${item.name}">Name</span>
            <span class="item-desc" th:text="${item.description}">Description</span>
            <span class="item-stock" th:text="'In stock: ' + ${item.stockQuantity}">In stock: 0</span>
        </div>
        <button th:attr="hx-vals='{ &quot;itemId&quot;: ' + ${item.id} + '}'"
                hx-post="/cart/add"
                hx-target="#cart-contents"
                hx-swap="innerHTML"
                class="btn-add">
            Add to Cart
        </button>
    </div>
</div>
</body>
</html>
